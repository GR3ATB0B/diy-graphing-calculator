; Nash's Graphing Calculator — PlatformIO Configuration
; Target: Seeed XIAO ESP32S3 + ST7789 320×240 + M5Stack CardKB

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
board_build.psram = enabled

lib_deps =
    bodmer/TFT_eSPI@^2.5.43

build_flags =
    -DUSER_SETUP_LOADED=1
    ; === ST7789 Display ===
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_RGB_ORDER=TFT_RGB
    ; === SPI Pins (XIAO ESP32S3) ===
    -DTFT_MOSI=9
    -DTFT_SCLK=7
    -DTFT_CS=2
    -DTFT_DC=3
    -DTFT_RST=4
    -DTFT_BL=5
    ; === SPI Speed ===
    -DSPI_FREQUENCY=80000000
    -DSPI_READ_FREQUENCY=20000000
    ; === Misc ===
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DBOARD_HAS_PSRAM=1
